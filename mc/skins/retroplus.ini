# retroplus (retrobox dark), matching ~/.config/nvim/colors/retroplus.lua
# Colors taken from Neovim's built-in retrobox dark highlight groups
# (/usr/share/nvim/runtime/colors/retrobox.vim).

[skin]
    description = retroplus (retrobox dark)
    truecolors = true

[Lines]
    horiz = ─
    vert = │
    lefttop = ┌
    righttop = ┐
    leftbottom = └
    rightbottom = ┘
    topmiddle = ┬
    bottommiddle = ┴
    leftmiddle = ├
    rightmiddle = ┤
    cross = ┼
    dhoriz = ═
    dvert = ║
    dlefttop = ╔
    drighttop = ╗
    dleftbottom = ╚
    drightbottom = ╝
    dtopmiddle = ╤
    dbottommiddle = ╧
    dleftmiddle = ╟
    drightmiddle = ╢

[aliases]
    Main = #1c1c1c
    MainFg = #ebdbb2
    MarkedFg = #fe8019
    HeaderFg = #b8bb26
    Selected = #504945
    SelectedFg = #ebdbb2
    Dialog = #3c3836
    DialogFocus = #504945
    Input = #504945
    PaleFg = #7c6f64
    ShadowFg = #7c6f64
    ShadowBg = #121212
    Error = #fb5944
    ErrorFocus = #cc241d
    Top = #ebdbb2
    MenuActive = Dialog
    MenuSelected = #fb5944
    Bottom = #ebdbb2
    BottomNumber = Main
    BottomNumberFg = MainFg
    Help = Dialog
    HelpBoldFg = #fe8019
    HelpItalicFg = #83a598
    HelpLinkFg = #fb5944
    EditorLineNumber = Dialog
    EditorWhitespace = #7c6f64
    EditorRightMargin = EditorWhitespace
    EditorBookmark = #fabd2f
    EditorFindAll = #fabd2f
    EditorVoid = Main
    EditorFrameFg = MainFg
    EditorFrameActiveFg = #fb5944
    EditorFrameDragFg = BottomNumberFg
    ViewerBoldFg = #fe8019
    ViewerUnderlinedFg = #83a598
    ViewerSelected = Selected
    DiffAdd = #b8bb26
    DiffChangedLine = #fabd2f
    DiffGap = #fb5944

[core]
    _default_ = MainFg;Main
    selected = SelectedFg;Selected
    marked = MarkedFg;;bold
    markselect = MarkedFg;Selected;bold
    gauge = ;DialogFocus
    input = MainFg;Input
    inputunchanged = PaleFg;Input
    inputmark = MainFg;DialogFocus
    disabled = PaleFg;Dialog
    reverse = Main;Bottom
    commandlinemark = Main;DialogFocus
    header = HeaderFg
    shadow = ShadowFg;ShadowBg

[dialog]
    _default_ = MainFg;Dialog
    dfocus = ;DialogFocus
    dhotnormal = ;;underline
    dhotfocus = ;DialogFocus;underline
    dtitle = ;;bold

[error]
    _default_ = MainFg;Error
    errdfocus = ;ErrorFocus
    errdhotnormal = ;;underline
    errdhotfocus = ;ErrorFocus;underline
    errdtitle = ;;bold

[filehighlight]
    directory = #b8bb26;;bold
    executable = #b8bb26
    symlink = #d3869b
    hardlink =
    stalelink = #fb5944
    device = #fe8019
    special = #fabd2f
    core = #fb5944
    temp = #928374
    archive = #fe8019
    doc = #83a598
    source = #fabd2f
    media = #b16286
    graph = #8ec07c
    database = #83a598

[menu]
    _default_ = Main;MenuActive
    menusel = MainFg;MenuSelected
    menuhot = ;;underline
    menuhotsel = ;MenuSelected;underline
    menuinactive = ;Top

[popupmenu]
    _default_ = MainFg;Dialog
    menusel = ;DialogFocus
    menutitle = ;;bold

[buttonbar]
    hotkey = BottomNumberFg;BottomNumber
    button = Main;Bottom

[statusbar]
    _default_ = Main;Top

[help]
    _default_ = Main;Help
    helpbold = HelpBoldFg;;bold
    helpitalic = HelpItalicFg;;italic
    helplink = HelpLinkFg;;underline
    helpslink = Help;HelpLinkFg

[editor]
    editbold = MarkedFg;;bold
    editmarked = ;Selected
    editwhitespace = ;EditorWhitespace
    editnonprintable = ;PaleFg
    editlinestate = Main;EditorLineNumber
    bookmark = Main;EditorBookmark
    bookmarkfound = Main;EditorFindAll
    editrightmargin = ;EditorRightMargin
    editbg = ;EditorVoid
    editframe = EditorFrameFg
    editframeactive = EditorFrameActiveFg
    editframedrag = EditorFrameDragFg

[viewer]
    viewbold = ViewerBoldFg;;bold
    viewunderline = ViewerUnderlinedFg;;underline
    viewselected = Main;ViewerSelected

[diffviewer]
    added = ;DiffAdd
    changedline = ;DiffChangedLine
    changednew = ;DiffAdd
    changed = ;DiffGap
    removed = ;DiffGap
    error = MainFg;Error

[widget-panel]
    sort-up-char = ▴
    sort-down-char = ▾
    hiddenfiles-show-char = •
    hiddenfiles-hide-char = ○
    history-prev-item-char = ◂
    history-next-item-char = ▸
    history-show-list-char = ▾
    filename-scroll-left-char = ◂
    filename-scroll-right-char = ▸

[widget-scrollbar]
    first-vert-char = ▴
    last-vert-char = ▾
    first-horiz-char = ◂
    last-horiz-char = ▸
    current-char = ■
    background-char = ▒

[widget-editor]
    window-state-char = ↕
    window-close-char = ✕
