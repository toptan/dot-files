[general]
import = [
  "~/.config/alacritty/ayu-theme.toml",
]

[font]
size = 12

[font.normal]
family = "Zed Mono Nerd Font"
style = "Regular"

# [font.italic]
# style = "Medium Oblique"

[font.offset]
y = 0

[font.glyph_offset]
y = 0

[scrolling]
history = 10000

[window]
opacity = 1
startup_mode = "Maximized"
option_as_alt = "Both"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
